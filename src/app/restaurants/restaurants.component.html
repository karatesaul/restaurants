<div class="list-page">
  <div class="list-page-header">
    <h1>Restaurants</h1>
    <a
      mat-flat-button
      color="primary"
      routerLink="add">
      Add Restaurant
    </a>
  </div>
  <table
    mat-table
    [dataSource]="restaurants()">

    <!-- Id -->
    <ng-container [matColumnDef]="columns.Id">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Id
      </th>
      <td
        mat-cell
        *matCellDef="let restaurant">
        {{ restaurant.id }}
      </td>
    </ng-container>

    <!-- Name -->
    <ng-container [matColumnDef]="columns.Name">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Name
      </th>
      <td
        mat-cell
        *matCellDef="let restaurant">
        {{ restaurant.name }}
      </td>
    </ng-container>

    <!-- Tags -->
    <ng-container [matColumnDef]="columns.Tags">
      <th
        mat-header-cell
        *matHeaderCellDef>
        Tags
      </th>
      <td
        mat-cell
        *matCellDef="let restaurant">
        <mat-chip-set #chipSet>
          <mat-chip *ngFor="let tag of restaurant.tags">{{ tag }}</mat-chip>
        </mat-chip-set>
        <p *ngIf="restaurant.tags.length === 0">No Tags</p>
      </td>
    </ng-container>

    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns">
    </tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns">
    </tr>

    <!-- No Data -->
    <tr
      class="mat-row"
      *matNoDataRow>
      <td
        class="mat-cell no-data"
        [attr.colspan]="displayedColumns.length">
        <span>No Data</span>
      </td>
    </tr>

  </table>
</div>
<router-outlet (deactivate)="onDeactivate()"></router-outlet>
